<!doctype html>
<html>
<head><meta charset="utf-8"><title>82-0 (fake test page)</title>
<style>
  /* Hostile page CSS to test the panel's style isolation */
  * { box-sizing: content-box !important; font-family: "Comic Sans MS" !important; }
  button { all: unset; color: hotpink !important; font-size: 40px !important; }
  div { line-height: 5 !important; }
</style>
</head>
<body>
  <div id="app">
    <h1>Fake 82-0 game</h1>
    <div id="settings-node">settings</div>
    <div id="roster-node">roster</div>
  </div>
<script>
(function () {
  // Mirror the REAL 82-0.com state model (reverse-engineered):
  //  - SETTINGS: one useState object {enabledDecades, hardMode, testMode,
  //    testModeTeamSelection, ballKnowledgeMode}. testMode is the unlock flag.
  //  - ROSTER: one useState object KEYED BY POSITION (PG/SG/SF/PF/C); each value
  //    is a player {player, ppg, rpg, apg, spg, bpg}.
  //  - RECORD: NOT stored — derived from the roster every render. So the cheat
  //    reaches 82-0 by maxing the roster, not by setting a win/loss hook.
  function App() {}
  function Settings() {}
  function Game() {}

  function makeHook(value) {
    var node = { memoizedState: value, next: null, queue: null };
    node.queue = { dispatch: function (v) { node.memoizedState = (typeof v === "function") ? v(node.memoizedState) : v; } };
    return node;
  }

  var settingsValue = {
    enabledDecades: ["90's"],
    hardMode: true,
    testMode: false,
    testModeTeamSelection: false,
    ballKnowledgeMode: true
  };
  var rosterValue = {
    PG: { player: "Test Guard", ppg: 11, rpg: 3, apg: 6, spg: 1, bpg: 0 },
    SG: { player: "Test Wing",  ppg: 14, rpg: 4, apg: 2, spg: 1, bpg: 0 },
    SF: { player: "Test Fwd",   ppg: 12, rpg: 5, apg: 3, spg: 1, bpg: 1 },
    PF: { player: "Test Four",  ppg: 10, rpg: 7, apg: 2, spg: 0, bpg: 1 },
    C:  { player: "Test Big",   ppg: 9,  rpg: 8, apg: 1, spg: 0, bpg: 2 }
  };

  // Real derivation (chunk 8bc7adc8536368bc.js): teamOvr -> wins.
  function deriveRecord(roster) {
    var ps = Object.keys(roster).map(function (k) { return roster[k]; });
    var g = 0, p = 0, m = 0, sp = 0, bp = 0;
    ps.forEach(function (t) { g += t.ppg || 0; p += t.rpg || 0; m += t.apg || 0; sp += t.spg || 0; bp += t.bpg || 0; });
    var h = Math.round(100 * (g / 133.4 * 0.46 + p / 39.7 * 0.25 + m / 29.3 * 0.18 + sp / 6.1 * 0.07 + bp / 3.2 * 0.04) * 10) / 10;
    var wins = Math.round(82 * Math.pow(Math.min(h / 110, 1), 1.15));
    return { teamOvr: h, wins: wins, losses: 82 - wins };
  }

  var hSettings = makeHook(settingsValue);
  var hRoster = makeHook(rosterValue);

  var fApp      = { type: App,      return: null, child: null, sibling: null, memoizedState: null };
  var fSettings = { type: Settings, return: fApp,  child: null, sibling: null, memoizedState: hSettings };
  var fGame     = { type: Game,     return: fApp,  child: null, sibling: null, memoizedState: hRoster };
  fApp.child = fSettings; fSettings.sibling = fGame;

  var KEY = "__reactFiber$test123";
  document.getElementById("settings-node")[KEY] = fSettings;
  document.getElementById("roster-node")[KEY] = fGame;

  window.__fake = {
    key: KEY,
    get settings() { return hSettings.memoizedState; },
    get roster() { return hRoster.memoizedState; },
    get record() { return deriveRecord(hRoster.memoizedState); } // derived, like the real game
  };
})();
</script>
</body>
</html>
